
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Under Maintenance</title>
<style>
  :root {
    --background: #f5f3ee;
    --card: #ffffff;
    --border: #e4e0d6;
    --foreground: #1a1a1a;
    --muted-foreground: #6b6b64;
    --accent: #c65d3b;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --background: #121212;
      --card: #1a1a1a;
      --border: #2c2c2c;
      --foreground: #f2f2f0;
      --muted-foreground: #9a9a92;
      --accent: #f4a6b8;
    }
  }

  * { box-sizing: border-box; }

  html, body { height: 100%; margin: 0; }

  body {
    background: var(--background);
    color: var(--foreground);
    font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 30px;
    padding: 32px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    opacity: 0;
    transform: translateY(16px) scale(0.97);
    animation: rise 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  @keyframes rise {
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .banner {
    width: 100%;
    height: 120px;
    border-radius: 12px;
    background: repeating-linear-gradient(
      135deg,
      var(--accent) 0px,
      var(--accent) 2px,
      transparent 2px,
      transparent 14px
    );
    background-color: color-mix(in srgb, var(--accent) 12%, var(--card));
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .banner svg {
    width: 44px;
    height: 44px;
    color: var(--accent);
    animation: spin 4s linear infinite;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  h1 {
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    text-decoration: underline;
    text-underline-offset: 5px;
    letter-spacing: 0.02em;
    font-size: 24px;
    margin: 0;
  }

  p.desc {
    color: var(--muted-foreground);
    font-size: 13px;
    line-height: 1.6;
    margin: 0;
  }

  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--muted-foreground);
  }

  .status .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }
</style>
</head>
<body>

  <div class="card">
    <div class="banner">
      <svg viewBox="0 0 256 256" fill="currentColor">
        <path d="M128,80a48,48,0,1,0,48,48A48.05,48.05,0,0,0,128,80Zm0,80a32,32,0,1,1,32-32A32,32,0,0,1,128,160Zm88-29.84q.06-2.16,0-4.32l14.92-18.64a8,8,0,0,0,1.48-7.06,107.6,107.6,0,0,0-10.88-26.25,8,8,0,0,0-6-4L195,73.85q-1.44-1.53-3-3L189,50.94a8,8,0,0,0-4-6,107.6,107.6,0,0,0-26.25-10.88,8,8,0,0,0-7.06,1.48L133.06,50.34c-1.44-.05-2.88-.05-4.32,0L111.14,35.41a8,8,0,0,0-7.06-1.48A107.6,107.6,0,0,0,77.83,44.81a8,8,0,0,0-4,6L71.94,68.6q-1.53,1.44-3,3L46.94,73.85a8,8,0,0,0-6,4,107.6,107.6,0,0,0-10.88,26.25,8,8,0,0,0,1.48,7.06L46.34,133.06q-.06,2.16,0,4.32L31.41,155.86a8,8,0,0,0-1.48,7.06,107.6,107.6,0,0,0,10.88,26.25,8,8,0,0,0,6,4l19.06,4.03q1.44,1.53,3,3l4.03,19.06a8,8,0,0,0,4,6,107.6,107.6,0,0,0,26.25,10.88,8,8,0,0,0,7.06-1.48l18.64-14.92q2.16.06,4.32,0l18.64,14.92a8,8,0,0,0,7.06,1.48,107.6,107.6,0,0,0,26.25-10.88,8,8,0,0,0,4-6l4.03-19.06q1.53-1.44,3-3l19.06-4.03a8,8,0,0,0,6-4,107.6,107.6,0,0,0,10.88-26.25,8,8,0,0,0-1.48-7.06Z"/>
      </svg>
    </div>

    <h1>Down for Maintenance</h1>

    <p class="desc">We're making some improvements. Back shortly — thanks for your patience.</p>

    <div class="status">
      <span class="dot"></span>
      In progress
    </div>
  </div>

</body>
</html>
